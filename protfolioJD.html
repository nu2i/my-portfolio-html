<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wejdan Dakhel — Information Technology</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>

  :root{
    --bg: #0a0d12;
    --bg-2: #12161f;
    --bg-3: #171c26;
    --border: #232a36;
    --text: #e8e6e1;
    --text-muted: #8d9099;
    --accent: #7c6ff0;
    --accent-soft: #7c6ff01a;
    --amber: #e8a33d;
    --secure: #3ecf8e;
    --mono: 'Fira Code', monospace;
    --sans: 'IBM Plex Mono', monospace;
  }

  *{ box-sizing: border-box; margin: 0; padding: 0; }

  html{ scroll-behavior: smooth; }

  body{
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  a{ color: inherit; text-decoration: none; }

  ::selection{ background: var(--accent); color: #0a0d12; }

  /* ---------- layout helpers ---------- */
  .wrap{ max-width: 880px; margin: 0 auto; padding: 0 24px; }
  section{ padding: 100px 0; border-bottom: 1px solid var(--border); }
  section:last-of-type{ border-bottom: none; }

  .eyebrow{
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .eyebrow::before{ content: '//'; color: var(--text-muted); }

  h2{
    font-family: var(--mono);
    font-weight: 500;
    font-size: 28px;
    letter-spacing: -0.02em;
    margin-bottom: 32px;
  }

  /* ---------- nav ---------- */
  nav{
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    background: rgba(10,13,18,0.85);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
  }
  nav .wrap{
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }
  .brand{
    font-family: var(--mono);
    font-weight: 700;
    font-size: 16px;
    color: var(--accent);
  }
  .nav-links{ display: flex; gap: 28px; }
  .nav-links a{
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-muted);
    transition: color .15s ease;
  }
  .nav-links a:hover, .nav-links a:focus-visible{ color: var(--text); }

  /* ---------- hero / terminal ---------- */
  .hero{
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-top: 64px;
    border-bottom: 1px solid var(--border);
  }

  .terminal{
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 24px 60px -30px rgba(62,207,142,0.2);
  }
  .terminal-bar{
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    background: var(--bg-3);
    border-bottom: 1px solid var(--border);
  }
  .dot{ width: 11px; height: 11px; border-radius: 50%; }
  .dot.red{ background: #e2544a; }
  .dot.amber{ background: #e8a33d; }
  .dot.green{ background: #63a856; }
  .terminal-title{
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    margin-left: 8px;
  }
  .terminal-body{
    padding: 28px 24px 32px;
    font-family: var(--mono);
    font-size: 15px;
    min-height: 250px;
  }
  .term-line{ display: flex; gap: 10px; margin-bottom: 10px; opacity: 0; }
  .term-line.show{ animation: reveal .3s ease forwards; }
  @keyframes reveal{ to{ opacity: 1; } }
  .prompt{ color: var(--accent); flex-shrink: 0; }
  .out{ color: var(--text-muted); }
  .highlight{ color: var(--secure); }
  .status{
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--secure);
  }
  .status .pulse{
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--secure);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{ opacity: 1; } 50%{ opacity: .35; } }
  .cursor{
    display: inline-block;
    width: 8px; height: 17px;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: -3px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink{ 50%{ opacity: 0; } }

  .hero-sub{
    font-size: 15.5px;
    color: var(--text-muted);
    max-width: 520px;
    margin: 28px 0 0;
  }
  .hero-cta{ display: flex; gap: 14px; margin-top: 32px; }
  .btn{
    font-family: var(--mono);
    font-size: 13px;
    padding: 12px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    transition: border-color .15s ease, transform .15s ease;
  }
  .btn:hover{ border-color: var(--accent); transform: translateY(-1px); }
  .btn.primary{ background: var(--accent); color: #0a0d12; border-color: var(--accent); font-weight: 500; }
  .btn.primary:hover{ opacity: .9; }

  /* ---------- about ---------- */
  .about-grid{
    display: grid;
    grid-template-columns: 1fr;
    gap: 40px;
  }
  .about-text{ font-size: 15px; color: var(--text-muted); max-width: 640px; }
  .about-text strong{ color: var(--text); font-weight: 500; }

  .stats{
    display: flex;
    gap: 40px;
    margin-top: 40px;
    flex-wrap: wrap;
  }
  .stat-num{
    font-family: var(--mono);
    font-size: 30px;
    color: var(--accent);
  }
  .stat-label{
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ---------- skills ---------- */
  .code-block{
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px 28px;
    font-family: var(--mono);
    font-size: 14px;
    overflow-x: auto;
    margin-bottom: 32px;
  }
  .code-block .key{ color: var(--amber); }
  .code-block .punct{ color: var(--text-muted); }
  .code-block .val{ color: var(--text); }
  .code-block div{ margin-bottom: 6px; white-space: nowrap; }

  .pill-row{ display: flex; flex-wrap: wrap; gap: 10px; }
  .pill{
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text-muted);
    transition: border-color .15s ease, color .15s ease;
  }
  .pill:hover{ border-color: var(--accent); color: var(--text); }

  /* ---------- footer ---------- */
  footer{ padding: 48px 0; }
  .footer-row{
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }
  .footer-links{ display: flex; gap: 24px; }
  .footer-links a{
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-muted);
    transition: color .15s ease;
  }
  .footer-links a:hover{ color: var(--accent); }
  .footer-note{ font-family: var(--mono); font-size: 12px; color: var(--text-muted); }

  /* ---------- reveal on scroll ---------- */
  .reveal{ opacity: 0; transform: translateY(16px); transition: opacity .5s ease, transform .5s ease; }
  .reveal.in{ opacity: 1; transform: none; }

  /* ---------- focus ---------- */
  a:focus-visible, .btn:focus-visible{ outline: 2px solid var(--accent); outline-offset: 2px; }

  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; transition: none !important; }
  }

  @media (min-width: 640px){
    .about-grid{ grid-template-columns: 160px 1fr; }
    h2{ font-size: 32px; }
  }

  @media (max-width: 560px){
    section{ padding: 72px 0; }
    .nav-links{ display: none; }
    .terminal-body{ font-size: 13px; }
  }
</style>
</head>
<body>

<nav>
  <div class="wrap">
    <div class="brand">wejdan@shell:~$</div>
  </div>
</nav>

<header class="hero">
  <div class="wrap">
    <div class="terminal">
      <div class="terminal-bar">
        <span class="dot red"></span>
        <span class="dot amber"></span>
        <span class="dot green"></span>
        <span class="terminal-title">wejdan@secure-shell: ~</span>
        <span class="status"><span class="pulse"></span>connection encrypted</span>
      </div>
      <div class="terminal-body" id="term">
        <div class="term-line"><span class="prompt">$</span><span>whoami</span></div>
        <div class="term-line"><span class="out">&gt; <span class="highlight">WEJDAN DAKHEL</span></span></div>
        <div class="term-line"><span class="prompt">$</span><span>cat education.txt</span></div>
        <div class="term-line"><span class="out">&gt; Information Technology</span></div>
        <div class="term-line"><span class="out">&gt; Taif University<span class="cursor"></span></span></div>
      </div>
    </div>
  </div>
</header>




<footer>
  <div class="wrap" style="text-align:center;">
    <div class="footer-note">designed &amp; built by Wejdan Dakhel</div>
  </div>
</footer>

<script>
  // type-reveal the terminal lines one by one
  document.querySelectorAll('.term-line').forEach((line, i) => {
    setTimeout(() => line.classList.add('show'), 300 + i * 450);
  });

  // fade sections in as they scroll into view
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
  }, { threshold: 0.15 });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));
</script>

</body>
</html>
